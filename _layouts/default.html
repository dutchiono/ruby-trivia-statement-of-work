<!doctype html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ page.title | default: site.title }}</title>
<style>
:root{color-scheme:light dark}
body{max-width:760px;margin:2.5rem auto;padding:0 1.2rem;font:17px/1.65 -apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:#232323}
@media(prefers-color-scheme:dark){body{color:#e7e7e7;background:#101011}a{color:#ec8a6a}}
a{color:#b5482e;text-decoration:none}a:hover{text-decoration:underline}
h1{margin:0 0 .4rem;line-height:1.2}h2{margin-top:2rem;border-bottom:1px solid #8883;padding-bottom:.2rem}
table{border-collapse:collapse;width:100%;margin:1rem 0}th,td{border:1px solid #8884;padding:.5rem .7rem;text-align:left}
th{background:#8a33241a}.big{font-size:1.15rem;font-weight:700}
blockquote{border-left:3px solid #b5482e;margin:1rem 0;padding:.3rem 1rem;color:#666}
</style></head><body>{{ content }}</body></html>
